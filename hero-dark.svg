<!-- 다크 테마용 배너 (조금 더 어두운 톤) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="320" viewBox="0 0 1600 320">
  <defs>
    <linearGradient id="gd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#075985"></stop>
      <stop offset="100%" stop-color="#166534"></stop>
    </linearGradient>
    <filter id="sd" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"></feGaussianBlur>
    </filter>
  </defs>
  <rect width="1600" height="320" fill="url(#gd)"></rect>
  <circle cx="1450" cy="60" r="120" fill="rgba(0,0,0,0.25)" filter="url(#sd)"></circle>
  <circle cx="150" cy="260" r="90" fill="rgba(0,0,0,0.2)" filter="url(#sd)"></circle>
  <text x="80" y="190" font-size="64" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#ECFEFF" font-weight="700">
    KO.SangJin — Backend &amp; AI
  </text>
  <text x="80" y="230" font-size="22" font-family="Inter, Segoe UI, Arial, sans-serif" fill="rgba(236,254,255,0.85)">
